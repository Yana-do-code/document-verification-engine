services:
  - type: web
    name: doc-verification-engine
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: UPLOAD_DIR
        value: uploads
      - key: IMAGE_MAX_WIDTH
        value: "1600"
      - key: MAX_UPLOAD_SIZE_MB
        value: "5"
      - key: OCR_LANG
        value: en
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
